<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>毕业留言分享站 - 学长学姐的心里话</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 40px; background: #f8f9fa; color: #333; line-height: 1.6; }
        body { font-family: "Microsoft YaHei", sans-serif; margin: 0; padding: 40px; background: #b5e3e5; color: #333; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .intro { font-size: 1.2em; text-align: center; margin: 30px 0; }
        .btn { display: inline-block; background: #3498db; color: white; padding: 12px 24px; border-radius: 6px; text-decoration: none; margin: 10px; }
        .btn:hover { background: #2980b9; }
        body {
    background: url('images/封面.jpg') no-repeat center center fixed;
    background-size: cover;
    background-attachment: fixed;
}
.container {
    background: rgba(255, 255, 255, 0.92);  /* 半透明白底，让文字清晰 */
    backdrop-filter: blur(5px);  /* 毛玻璃效果，现代感 */
}
    </style>
</head>
<body>
    <div style="text-align: center; margin-bottom: 30px;">
        <footer style="margin-top: 80px; text-align: center; color: #777; font-size: 0.9em;">
    <img src="校徽.png" alt="上海第二工业大学校徽" style="width: 100px; height: auto; opacity: 0.8; margin-bottom: 10px;">
            </footer>

        <h1>欢迎来到毕业留言分享站</h1>
        <p class="intro">
            这里收集了学长学姐们的毕业寄语、经验分享和心里话。<br />
            希望能给在校的你们一些温暖和方向！
        </p>

        <div class="center">
            <a href="messages.html" class="btn">查看所有留言</a>
            <a href="submit.html" class="btn btn-secondary">如何投稿</a>
        </div>

        <h2 class="section-title">最新留言预览</h2>
        <div id="latest" class="cards">
            <div class="empty-state">
                <div class="empty-title">还没有留言</div>
                <div class="empty-sub">去“如何投稿”写下你的第一条毕业寄语吧。</div>
            </div>
        </div>

        <footer class="footer">
           感谢您的投送 | Thanks
        </footer>
    </div>

    <script src="app.js"></script>
    <script>
        window.App?.renderLatest?.({ mountId: "latest", limit: 5 });
    </script>
</body>
</html>
